name: Avalonia CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            project: CCP.Avalonia.Desktop.Windows/CCP.Avalonia.Desktop.Windows.csproj
            rid: win-x64
            artifact: windows-desktop
          - os: ubuntu-latest
            project: CCP.Avalonia.Desktop.Linux/CCP.Avalonia.Desktop.Linux.csproj
            rid: linux-x64
            artifact: linux-desktop
          - os: macos-latest
            project: CCP.Avalonia.Desktop.macOS/CCP.Avalonia.Desktop.macOS.csproj
            rid: osx-arm64
            artifact: macos-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvlc-dev vlc

      - name: Build CCP.Avalonia
        run: dotnet build CCP.Avalonia/CCP.Avalonia.csproj -c Release

      - name: Build desktop head
        run: dotnet build ${{ matrix.project }} -c Release

      - name: Test CCP.Core
        run: dotnet test tests/CCP.Core.Tests/CCP.Core.Tests.csproj -c Release

      - name: Publish desktop head
        run: |
          dotnet publish ${{ matrix.project }} -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -o ./publish/${{ matrix.artifact }}

      - name: Verify single-file executable
        shell: bash
        run: |
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            test -f ./publish/${{ matrix.artifact }}/CCP.Desktop.Windows.exe
          elif [[ "${{ matrix.rid }}" == linux-* ]]; then
            test -f ./publish/${{ matrix.artifact }}/CCP.Desktop.Linux
            chmod +x ./publish/${{ matrix.artifact }}/CCP.Desktop.Linux
          elif [[ "${{ matrix.rid }}" == osx-* ]]; then
            test -f ./publish/${{ matrix.artifact }}/CCP.Desktop.macOS
            chmod +x ./publish/${{ matrix.artifact }}/CCP.Desktop.macOS
          fi

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./publish/${{ matrix.artifact }}
          if-no-files-found: error

  mobile:
    name: Mobile (Android)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install Android workload
        run: dotnet workload install android

      - name: Build Android
        run: dotnet build CCP.Avalonia.Android/CCP.Avalonia.Android.csproj -c Release
